<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | BiteDash Control Panel</title>
  
  <!-- Font Awesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Chart.js for Statistics graphs -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>

  <!-- Admin Header Navbar -->
  <header>
    <div class="container navbar">
      <a href="/index.html" class="logo">
        <i class="fas fa-fire"></i> Bite<span>Dash</span> <small style="font-size: 0.9rem; background-color: var(--accent-light); padding: 2px 8px; border-radius: 4px; font-family: var(--font-body); font-weight: 600;">ADMIN</small>
      </a>
      <div class="nav-actions">
        <!-- Theme Toggle -->
        <button id="theme-toggle" class="theme-toggle-btn">
          <i class="fas fa-moon"></i>
        </button>
        <!-- User/Auth Actions -->
        <div id="nav-auth-actions" style="display: flex; gap: 10px;">
          <!-- Loaded dynamically -->
        </div>
      </div>
    </div>
  </header>

  <!-- Admin Layout Wrapper -->
  <div class="container admin-layout">
    
    <!-- Sidebar Navigation -->
    <aside class="admin-sidebar">
      <ul class="admin-menu">
        <li><a href="/admin/dashboard.html" class="active"><i class="fas fa-chart-line"></i> Dashboard</a></li>
        <li><a href="/admin/manage-menu.html"><i class="fas fa-burger"></i> Manage Menu</a></li>
        <li><a href="/admin/manage-orders.html"><i class="fas fa-truck-ramp-box"></i> Manage Orders</a></li>
        <li style="margin-top: 30px; border-top: 1px solid var(--border-color); padding-top: 15px;">
          <a href="/menu.html" style="color: var(--accent);"><i class="fas fa-utensils"></i> Dine View</a>
        </li>
      </ul>
    </aside>

    <!-- Main Content Area -->
    <main class="admin-main">
      <div class="admin-header">
        <h2 style="font-size: 2rem;">Dashboard Overview</h2>
        <span style="font-size: 0.9rem; color: var(--text-secondary); font-weight: 500;">
          <i class="fas fa-clock"></i> Live Server Stats
        </span>
      </div>

      <!-- Stats Grid Counters -->
      <section class="admin-stats-grid">
        <!-- Total Orders -->
        <div class="glass-card admin-stat-card animate-fade-in">
          <div class="stat-icon"><i class="fas fa-receipt"></i></div>
          <div class="stat-info">
            <h3 id="stat-total-orders">-</h3>
            <span>Total Orders</span>
          </div>
        </div>
        
        <!-- Total Revenue -->
        <div class="glass-card admin-stat-card animate-fade-in" style="animation-delay: 0.1s;">
          <div class="stat-icon" style="color: var(--success); background-color: rgba(46, 196, 182, 0.1);"><i class="fas fa-wallet"></i></div>
          <div class="stat-info">
            <h3 id="stat-total-revenue">-</h3>
            <span>Total Revenue</span>
          </div>
        </div>

        <!-- Active Users -->
        <div class="glass-card admin-stat-card animate-fade-in" style="animation-delay: 0.2s;">
          <div class="stat-icon" style="color: var(--warning); background-color: rgba(255, 159, 28, 0.1);"><i class="fas fa-users"></i></div>
          <div class="stat-info">
            <h3 id="stat-active-users">-</h3>
            <span>Active Customers</span>
          </div>
        </div>
      </section>

      <!-- Charts and Popular List Row -->
      <div class="admin-row">
        <!-- Revenue Chart Card -->
        <div class="glass-card chart-card animate-fade-in">
          <h3 style="font-size: 1.2rem; margin-bottom: 20px;">Daily Sales History (7 Days)</h3>
          <div class="chart-container">
            <canvas id="salesChart"></canvas>
          </div>
        </div>

        <!-- Popular items List -->
        <div class="glass-card popular-items-card animate-fade-in">
          <h3 style="font-size: 1.2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">Top Selling Dishes</h3>
          <div id="dashboard-popular-list" class="popular-item-list">
            <!-- Injected via admin.js -->
          </div>
        </div>
      </div>
    </main>

  </div>

  <!-- Scripts -->
  <script src="/js/app.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
