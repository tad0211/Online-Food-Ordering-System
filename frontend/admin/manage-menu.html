<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Menu | BiteDash Control Panel</title>
  
  <!-- Font Awesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>

  <!-- Admin Header Navbar -->
  <header>
    <div class="container navbar">
      <a href="/index.html" class="logo">
        <i class="fas fa-fire"></i> Bite<span>Dash</span> <small style="font-size: 0.9rem; background-color: var(--accent-light); padding: 2px 8px; border-radius: 4px; font-family: var(--font-body); font-weight: 600;">ADMIN</small>
      </a>
      <div class="nav-actions">
        <!-- Theme Toggle -->
        <button id="theme-toggle" class="theme-toggle-btn">
          <i class="fas fa-moon"></i>
        </button>
        <!-- User/Auth Actions -->
        <div id="nav-auth-actions" style="display: flex; gap: 10px;">
          <!-- Loaded dynamically -->
        </div>
      </div>
    </div>
  </header>

  <!-- Admin Layout Wrapper -->
  <div class="container admin-layout">
    
    <!-- Sidebar Navigation -->
    <aside class="admin-sidebar">
      <ul class="admin-menu">
        <li><a href="/admin/dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a></li>
        <li><a href="/admin/manage-menu.html" class="active"><i class="fas fa-burger"></i> Manage Menu</a></li>
        <li><a href="/admin/manage-orders.html"><i class="fas fa-truck-ramp-box"></i> Manage Orders</a></li>
        <li style="margin-top: 30px; border-top: 1px solid var(--border-color); padding-top: 15px;">
          <a href="/menu.html" style="color: var(--accent);"><i class="fas fa-utensils"></i> Dine View</a>
        </li>
      </ul>
    </aside>

    <!-- Main Content Area -->
    <main class="admin-main">
      <div class="admin-header">
        <h2 style="font-size: 2rem;">Manage Restaurant Menu</h2>
      </div>

      <!-- Split Layout: Categories Forms and Items Form -->
      <div class="admin-row" style="grid-template-columns: 2fr 1.25fr; align-items: start;">
        
        <!-- Food Item Form Card -->
        <div class="glass-card" id="food-item-form-card" style="padding: 30px;">
          <h3 id="form-mode-title" style="font-size: 1.25rem; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">Add New Dish</h3>
          
          <form id="food-item-form" enctype="multipart/form-data">
            <!-- Hidden input for ID (only populated when editing) -->
            <input type="hidden" id="item-id" name="id">

            <div class="form-group">
              <label for="item-name">Dish Name</label>
              <input type="text" id="item-name" name="name" class="form-input" required placeholder="e.g. Garlic Bread">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
              <div class="form-group">
                <label for="item-price">Price (₹)</label>
                <input type="number" step="0.01" id="item-price" name="price" class="form-input" required placeholder="e.g. 150.00">
              </div>
              <div class="form-group">
                <label for="item-category-id">Category</label>
                <select id="item-category-id" name="category_id" class="form-input" required>
                  <option value="">Select Category</option>
                  <!-- Injected dynamically -->
                </select>
              </div>
            </div>

            <div class="form-group">
              <label for="item-description">Description</label>
              <textarea id="item-description" name="description" class="form-input" rows="3" placeholder="Describe flavor, key ingredients, etc."></textarea>
            </div>

            <div style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px;">
              <div class="form-group">
                <label for="item-image">Upload Image (JPG/PNG)</label>
                <input type="file" id="item-image" name="image" class="form-input" style="padding: 8px 12px;">
              </div>
              <div class="form-group">
                <label for="item-available">Stock Status</label>
                <select id="item-available" name="is_available" class="form-input">
                  <option value="true" selected>In Stock</option>
                  <option value="false">Out of Stock</option>
                </select>
              </div>
            </div>

            <div style="display: flex; gap: 15px; margin-top: 15px;">
              <button type="submit" id="food-item-submit-btn" class="btn btn-primary" style="flex: 1;">
                <i class="fas fa-plus"></i> Add Item
              </button>
              <button type="button" class="btn btn-secondary" onclick="resetItemForm()">Reset / Cancel</button>
            </div>
          </form>
        </div>

        <!-- Manage Categories Side Column -->
        <div style="display: flex; flex-direction: column; gap: 30px;">
          
          <!-- Category Create Form -->
          <div class="glass-card" style="padding: 25px;">
            <h3 style="font-size: 1.15rem; margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px;">Create Category</h3>
            <form id="category-form" enctype="multipart/form-data">
              <div class="form-group">
                <label for="category-name">Name</label>
                <input type="text" id="category-name" name="name" class="form-input" required placeholder="e.g. Soups">
              </div>
              <div class="form-group">
                <label for="category-image">Image File</label>
                <input type="file" id="category-image" name="image" class="form-input" style="padding: 8px 12px;">
              </div>
              <button type="submit" class="btn btn-primary btn-sm" style="width: 100%; margin-top: 10px;">
                <i class="fas fa-plus"></i> Create
              </button>
            </form>
          </div>

          <!-- Existing Categories Quick View -->
          <div>
            <h4 style="margin-bottom: 15px;">Active Categories</h4>
            <div id="admin-categories-list">
              <!-- Injected dynamically -->
            </div>
          </div>

        </div>

      </div>

      <!-- Menu Food Items Data Table -->
      <section class="glass-card" style="margin-top: 50px; padding: 30px;">
        <h3 style="font-size: 1.25rem; margin-bottom: 20px;">All Food Items</h3>
        
        <div class="table-responsive">
          <table class="admin-table">
            <thead>
              <tr>
                <th style="width: 80px;">Image</th>
                <th>Dish Name</th>
                <th>Category</th>
                <th>Price</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="food-items-table-body">
              <!-- Injected dynamically -->
            </tbody>
          </table>
        </div>
      </section>
    </main>

  </div>

  <!-- Scripts -->
  <script src="/js/app.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
